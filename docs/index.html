<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="NutriSage">
    <link rel="apple-touch-icon" href="images/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/x-icon" href="images/favicon_io/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3e4eb8">
    <meta name="description" content="Track daily food macros with AI-estimated nutrition.">
    <title>NutriSageAI - Food Macro Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header id="banner">
        <svg id="banner-mark" viewBox="0 0 24 24" width="40" height="40" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M12 2C7 6 4 9 4 14a8 8 0 0 0 16 0c0-5-3-8-8-12Zm0 3.6c3.3 2.9 5 5.2 5 8.4a5 5 0 0 1-5 5V5.6Z"/>
        </svg>
        <div id="banner-text">
            <h1>NutriSageAI</h1>
            <p>Daily macro tracker</p>
        </div>
        <button type="button" id="whoami" hidden></button>
    </header>

    <!-- Login: pick a profile, paste secret once -->
    <section id="loginSection">
        <h2>Who's tracking?</h2>
        <div id="profilePicker"></div>
        <form id="loginForm" hidden>
            <p id="loginName" class="login-name"></p>
            <input type="password" id="secretInput" placeholder="Access key" autocomplete="off" />
            <button type="submit">Continue</button>
            <button type="button" id="loginBack">Back</button>
        </form>
        <p id="loginStatus" class="status" role="status" aria-live="polite"></p>
    </section>

    <!-- App: everything below is shown only after login -->
    <main id="appSection" hidden>
        <div id="dateNav">
            <button type="button" id="prevDay" aria-label="Previous day">‹</button>
            <input type="date" id="dateInput" />
            <button type="button" id="nextDay" aria-label="Next day">›</button>
            <button type="button" id="todayBtn">Today</button>
        </div>

        <section id="totalsSection">
            <h2>Daily Progress</h2>
            <div id="progressBars"></div>
        </section>

        <section id="weekSection">
            <h2>This Week</h2>
            <div id="weekBars"></div>
        </section>

        <section id="foodEntriesSection">
            <h2>Food Entries</h2>
            <form id="foodForm">
                <input type="text" id="foodInput" placeholder="Enter food item" maxlength="60" autocomplete="off" />
                <button type="submit" id="addButton">Add</button>
                <button type="button" id="clearButton">Clear Day</button>
            </form>
            <p id="status" class="status" role="status" aria-live="polite"></p>

            <div id="favorites">
                <h3>Quick add</h3>
                <div id="favoriteChips"></div>
            </div>

            <div class="table-container">
                <table id="entriesTable">
                    <thead>
                        <tr>
                            <th>Food Item</th><th>Carbs</th><th>Protein</th><th>Fats</th><th>Calories</th><th></th>
                        </tr>
                    </thead>
                    <tbody id="entries"></tbody>
                </table>
            </div>
        </section>

        <section id="goalsSection">
            <h2>Daily Goals</h2>
            <form id="goalsForm">
                <label>Carbs <input type="number" id="goalCarbs" min="0" /></label>
                <label>Protein <input type="number" id="goalProtein" min="0" /></label>
                <label>Fat <input type="number" id="goalFat" min="0" /></label>
                <label>Calories <input type="number" id="goalCalories" min="0" /></label>
                <button type="submit">Save goals</button>
            </form>
            <p id="goalsStatus" class="status" role="status" aria-live="polite"></p>
        </section>
    </main>

    <script src="macros.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .catch((error) => console.log('ServiceWorker registration failed: ', error));
        }
    </script>
</body>
</html>
